x-spark-common: &spark-common
  build: 
    context: .
    dockerfile: Dockerfile
  # Die Volumes bleiben für die ENTWICKLUNG erhalten. 
  # "überschreibt" den COPY-Befehl aus dem Dockerfile live. 
  # kein neu start bei Code-Änderung!
  volumes:
    - ./src:/opt/spark/work-dir/src
    - ./raw_data:/opt/spark/work-dir/raw_data
    - ./.env:/opt/spark/work-dir/.env

services:
  spark-master:
    <<: *spark-common
    container_name: spark-master
    environment:
      - SPARK_MODE=master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8081:8080"
      - "7077:7077"

  spark-worker:
    <<: *spark-common
    environment:
      - SPARK_MODE=worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    depends_on:
      - spark-master

  spark-client:
    <<: *spark-common
    container_name: spark-client
    entrypoint: ["/bin/bash", "-c", "sleep infinity"]